<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1320"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1100" height="1320" fill="#ffffff"/>

  <!-- =================== Title =================== -->
  <text x="550" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">
    SupportMate — Hybrid Workflow + ReAct Architecture
  </text>
  <text x="550" y="68" text-anchor="middle" font-size="13" fill="#64748b">
    Deterministic outer pipeline with an LLM-driven ReAct loop in the middle
  </text>

  <!-- =================== Legend =================== -->
  <g transform="translate(40, 100)">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#64748b" letter-spacing="1.5">LEGEND</text>
    <rect x="0" y="12" width="14" height="14" rx="3" fill="#dbeafe" stroke="#475569" stroke-width="1"/>
    <text x="22" y="24" font-size="12" fill="#1e293b">Deterministic (no LLM)</text>
    <rect x="0" y="34" width="14" height="14" rx="3" fill="#d1fae5" stroke="#475569" stroke-width="1"/>
    <text x="22" y="46" font-size="12" fill="#1e293b">LLM-driven (ReAct loop)</text>
    <rect x="0" y="56" width="14" height="14" rx="3" fill="#fee2e2" stroke="#475569" stroke-width="1"/>
    <text x="22" y="68" font-size="12" fill="#1e293b">Refusal (fixed string)</text>
    <rect x="0" y="78" width="14" height="14" rx="3" fill="#fef3c7" stroke="#475569" stroke-width="1"/>
    <text x="22" y="90" font-size="12" fill="#1e293b">Mixed (deterministic + LLM)</text>
  </g>

  <!-- =================== User =================== -->
  <g filter="url(#soft)">
    <ellipse cx="550" cy="140" rx="62" ry="20" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <text x="550" y="145" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">User</text>
  </g>
  <line x1="550" y1="160" x2="550" y2="184" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- =================== FastAPI /chat =================== -->
  <g filter="url(#soft)">
    <rect x="430" y="187" width="240" height="40" rx="8" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <text x="550" y="212" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">FastAPI /chat</text>
  </g>
  <line x1="550" y1="227" x2="550" y2="253" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- =================== input_guardrail =================== -->
  <g filter="url(#soft)">
    <rect x="410" y="256" width="280" height="60" rx="8" fill="#dbeafe" stroke="#475569" stroke-width="1.5"/>
    <text x="550" y="280" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">input_guardrail</text>
    <text x="550" y="300" text-anchor="middle" font-size="12" fill="#475569">scan for prompt-injection patterns</text>
  </g>
  <line x1="550" y1="316" x2="550" y2="342" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- =================== intent_router =================== -->
  <g filter="url(#soft)">
    <rect x="410" y="345" width="280" height="60" rx="8" fill="#dbeafe" stroke="#475569" stroke-width="1.5"/>
    <text x="550" y="369" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">intent_router</text>
    <text x="550" y="389" text-anchor="middle" font-size="12" fill="#475569">rules + LLM fallback for classification</text>
  </g>
  <line x1="550" y1="405" x2="550" y2="431" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- =================== authorization =================== -->
  <g filter="url(#soft)">
    <rect x="410" y="434" width="280" height="60" rx="8" fill="#dbeafe" stroke="#475569" stroke-width="1.5"/>
    <text x="550" y="458" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">authorization</text>
    <text x="550" y="478" text-anchor="middle" font-size="12" fill="#475569">tenant + user_id gate</text>
  </g>
  <line x1="550" y1="494" x2="550" y2="520" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- =================== memory_load =================== -->
  <g filter="url(#soft)">
    <rect x="410" y="523" width="280" height="60" rx="8" fill="#dbeafe" stroke="#475569" stroke-width="1.5"/>
    <text x="550" y="547" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">memory_load</text>
    <text x="550" y="567" text-anchor="middle" font-size="12" fill="#475569">sanitised session recap</text>
  </g>
  <line x1="550" y1="583" x2="550" y2="610" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- =================== Branch diamond =================== -->
  <g filter="url(#soft)">
    <polygon points="550,613 660,675 550,737 440,675" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
    <text x="550" y="671" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">branch</text>
    <text x="550" y="690" text-anchor="middle" font-size="11" fill="#64748b">on intent / blocked</text>
  </g>

  <!-- Branch labels -->
  <text x="290" y="700" font-size="11" fill="#64748b" font-style="italic">blocked / unauthorized</text>
  <text x="563" y="755" font-size="11" fill="#64748b" font-style="italic">most intents</text>
  <text x="730" y="700" font-size="11" fill="#64748b" font-style="italic">escalation intent</text>

  <!-- Branch arrows -->
  <path d="M 440 675 L 285 770" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="737" x2="550" y2="838" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 660 675 L 815 770" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- =================== refusal_responder =================== -->
  <g filter="url(#soft)">
    <rect x="145" y="773" width="280" height="60" rx="8" fill="#fee2e2" stroke="#475569" stroke-width="1.5"/>
    <text x="285" y="797" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">refusal_responder</text>
    <text x="285" y="817" text-anchor="middle" font-size="12" fill="#475569">fixed deterministic string</text>
  </g>

  <!-- =================== escalation =================== -->
  <g filter="url(#soft)">
    <rect x="675" y="773" width="280" height="60" rx="8" fill="#fef3c7" stroke="#475569" stroke-width="1.5"/>
    <text x="815" y="797" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">escalation</text>
    <text x="815" y="817" text-anchor="middle" font-size="12" fill="#475569">creates ticket deterministically</text>
  </g>

  <!-- escalation flows down into react_agent -->
  <path d="M 815 833 Q 815 870 715 880" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="828" y="861" font-size="11" fill="#64748b" font-style="italic">then compose reply</text>

  <!-- =================== react_agent =================== -->
  <g filter="url(#soft)">
    <rect x="378" y="841" width="344" height="110" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2.5"/>
    <text x="550" y="866" text-anchor="middle" font-size="17" font-weight="800" fill="#064e3b">react_agent</text>
    <text x="550" y="887" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">LLM ⇄ tools loop</text>
    <text x="550" y="906" text-anchor="middle" font-size="11" fill="#065f46">think → call tool → observe → think → ...</text>
    <text x="550" y="924" text-anchor="middle" font-size="11" fill="#065f46">7 authorized LangChain tools</text>
    <text x="550" y="940" text-anchor="middle" font-size="10" fill="#065f46" font-style="italic">(auth context injected — LLM cannot spoof)</text>
  </g>

  <!-- react_agent → audit_log -->
  <line x1="550" y1="951" x2="550" y2="982" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- refusal_responder → audit_log (curve) -->
  <path d="M 285 833 Q 285 940 410 1000" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- =================== audit_log =================== -->
  <g filter="url(#soft)">
    <rect x="410" y="985" width="280" height="60" rx="8" fill="#dbeafe" stroke="#475569" stroke-width="1.5"/>
    <text x="550" y="1009" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">audit_log</text>
    <text x="550" y="1029" text-anchor="middle" font-size="12" fill="#475569">append to logs/audit.jsonl</text>
  </g>
  <line x1="550" y1="1045" x2="550" y2="1071" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- =================== memory_save =================== -->
  <g filter="url(#soft)">
    <rect x="410" y="1074" width="280" height="60" rx="8" fill="#dbeafe" stroke="#475569" stroke-width="1.5"/>
    <text x="550" y="1098" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">memory_save</text>
    <text x="550" y="1118" text-anchor="middle" font-size="12" fill="#475569">sanitised summary for next turn</text>
  </g>
  <line x1="550" y1="1134" x2="550" y2="1162" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- =================== Response =================== -->
  <g filter="url(#soft)">
    <ellipse cx="550" cy="1180" rx="80" ry="20" fill="#f1f5f9" stroke="#475569" stroke-width="1.5"/>
    <text x="550" y="1185" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Response</text>
  </g>

  <!-- =================== Side annotation: outer chassis =================== -->
  <g transform="translate(85, 256)">
    <line x1="0" y1="0" x2="0" y2="327" stroke="#94a3b8" stroke-width="2"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#94a3b8" stroke-width="2"/>
    <line x1="-5" y1="327" x2="5" y2="327" stroke="#94a3b8" stroke-width="2"/>
    <text x="-12" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b"
          letter-spacing="1" transform="rotate(-90, -12, 165)">OUTER PIPELINE (DETERMINISTIC)</text>
  </g>

  <!-- =================== Side annotation: ReAct middle =================== -->
  <g transform="translate(85, 841)">
    <line x1="0" y1="0" x2="0" y2="110" stroke="#10b981" stroke-width="2"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#10b981" stroke-width="2"/>
    <line x1="-5" y1="110" x2="5" y2="110" stroke="#10b981" stroke-width="2"/>
    <text x="-12" y="55" text-anchor="middle" font-size="11" font-weight="700" fill="#10b981"
          letter-spacing="1" transform="rotate(-90, -12, 55)">REACT (LLM)</text>
  </g>

  <!-- =================== Side annotation: outer tail =================== -->
  <g transform="translate(85, 985)">
    <line x1="0" y1="0" x2="0" y2="149" stroke="#94a3b8" stroke-width="2"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#94a3b8" stroke-width="2"/>
    <line x1="-5" y1="149" x2="5" y2="149" stroke="#94a3b8" stroke-width="2"/>
    <text x="-12" y="75" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b"
          letter-spacing="1" transform="rotate(-90, -12, 75)">DETERMINISTIC TAIL</text>
  </g>

  <!-- =================== Footer note =================== -->
  <text x="550" y="1240" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">
    Auth, prompt-injection defence, and audit logging always run. The LLM never sees blocked input.
  </text>
  <text x="550" y="1258" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">
    The LLM decides which tools to call and how to compose the reply — within the bounds the outer graph enforces.
  </text>

</svg>
